<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student - Type-1</title>
</head>
<body>
    <h1>Update Student - Type-1</h1>
    <form method="POST" action="/student/update_type1/{{ student.pk }}/">
        {% csrf_token %}
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" value="{{ student.age }}" required><br><br>

        <label for="testscore">Test Score:</label>
        <input type="number" id="testscore" name="testscore" value="{{ student.testscore }}" required><br><br>

        <input type="submit" value="Update Student">
    </form>
</body>
</html>
